name: linux-container
description: Run a script inside a Linux distro container as a sudo-capable ci user.

inputs:
  image:
    description: Container image (e.g. docker.io/library/debian:trixie).
    required: true
  pkg-manager:
    description: Package manager the base distro uses (apt|dnf|zypper|pacman).
    required: true
  script:
    description: Shell script run as the ci user with the checkout at /work.
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        IMAGE: ${{ inputs.image }}
        PKG: ${{ inputs.pkg-manager }}
        SCRIPT: ${{ inputs.script }}
      run: |
        set -euo pipefail
        printf '%s\n' "$SCRIPT" > "$GITHUB_WORKSPACE/.ci-run.sh"
        chmod +x "$GITHUB_WORKSPACE/.ci-run.sh"

        docker run --rm \
          -v "$GITHUB_WORKSPACE:/work" \
          -w /work \
          -e CI=true \
          -e PKG="$PKG" \
          "$IMAGE" \
          bash -eu -o pipefail -c '
            case "$PKG" in
              apt)
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y sudo curl git ca-certificates gnupg
                ;;
              dnf)
                dnf install -y sudo curl git ca-certificates
                ;;
              zypper)
                zypper --non-interactive refresh
                zypper --non-interactive install sudo curl git ca-certificates
                ;;
              pacman)
                pacman -Sy --noconfirm --needed sudo curl git ca-certificates
                ;;
              *)
                echo "unknown pkg-manager: $PKG" >&2
                exit 1
                ;;
            esac

            id ci >/dev/null 2>&1 || useradd -m -s /bin/bash ci
            echo "ci ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/ci
            chmod 0440 /etc/sudoers.d/ci
            chown -R ci:ci /work

            su - ci -c "cd /work && bash .ci-run.sh"
          '
