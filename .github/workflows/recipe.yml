name: recipe

on:
  push:
    branches: ['dev/**']
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      recipe: ${{ steps.parse.outputs.recipe }}
      targets: ${{ steps.classify.outputs.targets }}
    steps:
      - id: parse
        env:
          REF: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          branch="${HEAD_REF:-$REF}"
          recipe="${branch#dev/}"
          if [[ "$recipe" == "pacman-mask-cicku" ]]; then
            echo "pacman-mask-cicku is excluded from CI" >&2
            exit 1
          fi
          if [[ -z "$recipe" || "$recipe" == "$branch" ]]; then
            echo "branch '$branch' is not of the form dev/<recipe>" >&2
            exit 1
          fi
          echo "recipe=$recipe" >> "$GITHUB_OUTPUT"
          echo "Recipe: $recipe"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch origin/master
        run: git fetch --no-tags --depth=1 origin master

      - id: classify
        env:
          RECIPE: ${{ steps.parse.outputs.recipe }}
        run: |
          set -euo pipefail
          targets=$(bash .github/scripts/recipe/classify-targets.sh)
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "$targets" | python3 -m json.tool

  target:
    needs: setup
    if: needs.setup.outputs.targets != '[]'
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.targets) }}
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v6

      - if: matrix.kind == 'linux-container'
        uses: ./.github/actions/linux-container-setup
        with:
          pkg: ${{ matrix.pkg }}

      - if: matrix.kind == 'mac'
        uses: ./.github/actions/mac-nix-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.kind == 'linux-container'
        name: bootstrap + just ${{ needs.setup.outputs.recipe }} (container)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chown -R ci:ci "$GITHUB_WORKSPACE"
          su -l ci -c "export GITHUB_TOKEN='$GITHUB_TOKEN'; cd '$GITHUB_WORKSPACE' && bash init.sh && just ${{ needs.setup.outputs.recipe }}"

      - if: matrix.kind == 'ubuntu'
        name: bootstrap + just ${{ needs.setup.outputs.recipe }} (ubuntu)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}

      - if: matrix.kind == 'mac'
        name: bootstrap + just ${{ needs.setup.outputs.recipe }} (mac)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # shellcheck disable=SC1091
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}
