name: recipe

on:
  push:
    branches: ['dev/**']
  pull_request:
    branches: ['dev/**']
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      recipe: ${{ steps.parse.outputs.recipe }}
    steps:
      - id: parse
        env:
          REF: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          branch="${HEAD_REF:-$REF}"
          recipe="${branch#dev/}"
          if [[ "$recipe" == "pacman-mask-cicku" ]]; then
            echo "pacman-mask-cicku is excluded from CI" >&2
            exit 1
          fi
          if [[ -z "$recipe" || "$recipe" == "$branch" ]]; then
            echo "branch '$branch' is not of the form dev/<recipe>" >&2
            exit 1
          fi
          echo "recipe=$recipe" >> "$GITHUB_OUTPUT"
          echo "Recipe: $recipe"

  ubuntu:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}

  linux-container:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-trixie
            image: docker.io/library/debian:trixie
            pkg: apt
          - name: fedora-43
            image: quay.io/fedora/fedora:43
            pkg: dnf
          - name: fedora-44
            image: quay.io/fedora/fedora:44
            pkg: dnf
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            pkg: zypper
          - name: cachyos
            image: docker.io/cachyos/cachyos:latest
            pkg: pacman
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install base tools and create ci user
        run: |
          set -eu
          case "${{ matrix.pkg }}" in
            apt)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y sudo curl git ca-certificates gnupg
              ;;
            dnf)
              dnf install -y sudo curl git ca-certificates
              ;;
            zypper)
              zypper --non-interactive refresh
              zypper --non-interactive install sudo curl git ca-certificates
              ;;
            pacman)
              pacman -Sy --noconfirm --needed sudo curl git ca-certificates
              ;;
          esac
          id ci >/dev/null 2>&1 || useradd -m -s /bin/bash ci
          # Append directly to /etc/sudoers; not all base images include
          # /etc/sudoers.d (opensuse tumbleweed's default does not).
          echo "ci ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
      - uses: actions/checkout@v6
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          chown -R ci:ci "$GITHUB_WORKSPACE"
          su - ci -c "cd '$GITHUB_WORKSPACE' && bash init.sh && just ${{ needs.setup.outputs.recipe }}"

  mac:
    needs: setup
    if: needs.setup.outputs.recipe != 'flatpak'
    runs-on: macos-26
    env:
      HOSTNAME: ci
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix and seed GitHub access token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Install nix up front (init.sh will skip its own install), then
          # write the GitHub token into /etc/nix/nix.conf so flake fetches
          # avoid api.github.com's anonymous rate limit. Sudo would strip
          # the env var, so system-wide nix.conf is the reliable channel.
          sh <(curl -L https://nixos.org/nix/install) --daemon </dev/null
          echo "access-tokens = github.com=$GH_TOKEN" | sudo tee -a /etc/nix/nix.conf > /dev/null
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          # shellcheck disable=SC1091
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}
