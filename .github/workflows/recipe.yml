name: recipe

on:
  push:
    branches: ['dev/**']
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      recipe: ${{ steps.parse.outputs.recipe }}
    steps:
      - id: parse
        env:
          REF: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          branch="${HEAD_REF:-$REF}"
          recipe="${branch#dev/}"
          if [[ "$recipe" == "pacman-mask-cicku" ]]; then
            echo "pacman-mask-cicku is excluded from CI" >&2
            exit 1
          fi
          if [[ -z "$recipe" || "$recipe" == "$branch" ]]; then
            echo "branch '$branch' is not of the form dev/<recipe>" >&2
            exit 1
          fi
          echo "recipe=$recipe" >> "$GITHUB_OUTPUT"
          echo "Recipe: $recipe"

  ubuntu:
    needs: setup
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}

  linux-container:
    needs: setup
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: debian-trixie
            image: docker.io/library/debian:trixie
            pkg: apt
          - name: fedora-43
            image: quay.io/fedora/fedora:43
            pkg: dnf
          - name: fedora-44
            image: quay.io/fedora/fedora:44
            pkg: dnf
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            pkg: zypper
          - name: cachyos
            image: docker.io/cachyos/cachyos:latest
            pkg: pacman
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/linux-container-setup
        with:
          pkg: ${{ matrix.pkg }}
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          chown -R ci:ci "$GITHUB_WORKSPACE"
          su - ci -c "cd '$GITHUB_WORKSPACE' && bash init.sh && just ${{ needs.setup.outputs.recipe }}"

  mac:
    needs: setup
    if: needs.setup.outputs.recipe != 'flatpak'
    runs-on: macos-26
    env:
      HOSTNAME: ci
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/mac-nix-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: bootstrap + just ${{ needs.setup.outputs.recipe }}
        run: |
          # shellcheck disable=SC1091
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          bash init.sh
          just ${{ needs.setup.outputs.recipe }}
