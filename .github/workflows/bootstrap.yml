name: bootstrap

on:
  push:
    branches:
      - 'bootstrap/shared'
      - 'ci/**'
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: bash init.sh

  linux-container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-trixie
            image: docker.io/library/debian:trixie
            pkg: apt
          - name: fedora-43
            image: quay.io/fedora/fedora:43
            pkg: dnf
          - name: fedora-44
            image: quay.io/fedora/fedora:44
            pkg: dnf
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            pkg: zypper
          - name: cachyos
            image: docker.io/cachyos/cachyos:latest
            pkg: pacman
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/linux-container-setup
        with:
          pkg: ${{ matrix.pkg }}
      - name: bash init.sh
        run: |
          chown -R ci:ci "$GITHUB_WORKSPACE"
          su - ci -c "cd '$GITHUB_WORKSPACE' && bash init.sh"

  mac:
    runs-on: macos-26
    env:
      HOSTNAME: ci
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/mac-nix-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('init.sh') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-macos: 1073741824
      - name: bash init.sh
        run: |
          # shellcheck disable=SC1091
          . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          bash init.sh
