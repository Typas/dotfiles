name: bootstrap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Create ci user with passwordless sudo
        run: |
          sudo useradd -m -s /bin/bash ci
          echo "ci ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/ci >/dev/null
          sudo chmod 0440 /etc/sudoers.d/ci
          sudo chown -R ci:ci "$GITHUB_WORKSPACE"
      - name: bash init.sh
        run: sudo -u ci bash -lc "cd '$GITHUB_WORKSPACE' && bash init.sh"

  linux-container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-trixie
            image: docker.io/library/debian:trixie
            pkg: apt
          - name: fedora-43
            image: quay.io/fedora/fedora:43
            pkg: dnf
          - name: fedora-44
            image: quay.io/fedora/fedora:44
            pkg: dnf
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            pkg: zypper
          - name: cachyos
            image: docker.io/cachyos/cachyos:latest
            pkg: pacman
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/linux-container
        with:
          image: ${{ matrix.image }}
          pkg-manager: ${{ matrix.pkg }}
          script: bash init.sh

  mac:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: bash init.sh
        run: bash init.sh
