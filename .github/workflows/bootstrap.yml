name: bootstrap

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash init.sh

  linux-container:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-trixie
            image: docker.io/library/debian:trixie
            pkg: apt
          - name: fedora-43
            image: quay.io/fedora/fedora:43
            pkg: dnf
          - name: fedora-44
            image: quay.io/fedora/fedora:44
            pkg: dnf
          - name: opensuse-tumbleweed
            image: registry.opensuse.org/opensuse/tumbleweed:latest
            pkg: zypper
          - name: cachyos
            image: docker.io/cachyos/cachyos:latest
            pkg: pacman
    name: ${{ matrix.name }}
    container:
      image: ${{ matrix.image }}
      options: --user root
    steps:
      - name: Install base tools
        run: |
          set -eu
          case "${{ matrix.pkg }}" in
            apt)
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y sudo curl git ca-certificates gnupg
              ;;
            dnf)
              dnf install -y sudo curl git ca-certificates
              ;;
            zypper)
              zypper --non-interactive refresh
              zypper --non-interactive install sudo curl git ca-certificates
              ;;
            pacman)
              pacman -Sy --noconfirm --needed sudo curl git ca-certificates
              ;;
          esac
      - uses: actions/checkout@v4
      - run: bash init.sh

  mac:
    runs-on: macos-26
    env:
      NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
    steps:
      - uses: actions/checkout@v4
      - run: bash init.sh
